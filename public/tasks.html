<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tasks — Delta Mail</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/styles.css">
<link rel="icon" type="image/png" href="/delta-logo.png">
<style>
  body { display: flex; flex-direction: column; overflow: hidden; }
  .tasks-app {
    display: grid;
    grid-template-columns: 280px 1fr 380px;
    height: 100vh;
    background: var(--paper);
    flex: 1;
    min-height: 0;
  }
  /* Hide right detail pane when no task selected */
  .tasks-app.no-selection { grid-template-columns: 280px 1fr 0; }
  .tasks-app.no-selection .task-detail { display: none; }

  /* Left rail */
  .tasks-rail {
    background: var(--cream);
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .tasks-rail-head {
    padding: 14px 14px 10px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px;
  }
  .tasks-rail-head a.back {
    color: var(--navy-soft); text-decoration: none; font-size: 13px;
  }
  .tasks-rail-head a.back:hover { color: var(--navy); }
  .tasks-rail-body {
    flex: 1; overflow-y: auto; padding: 8px 6px;
  }
  .tasks-rail-foot {
    padding: 10px 10px 14px;
    border-top: 1px solid var(--line);
  }
  .new-list-btn {
    display: flex; align-items: center; gap: 6px;
    width: 100%; background: transparent;
    border: 1px solid var(--line); color: var(--navy);
    padding: 9px 12px; border-radius: 8px;
    font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer;
  }
  .new-list-btn:hover { border-color: var(--gold); color: var(--gold-dark); background: var(--paper); }

  .rail-section { padding: 0 4px; margin-bottom: 12px; }
  .rail-section-label {
    padding: 8px 10px 4px;
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .5px;
    font-weight: 700;
  }
  .rail-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: 8px;
    cursor: pointer; color: var(--navy);
    font-size: 13.5px; font-weight: 500;
  }
  .rail-item:hover { background: var(--cream-dark); }
  .rail-item.active { background: var(--paper); color: var(--gold-dark); box-shadow: 0 1px 3px rgba(40,47,57,.08); }
  .rail-item .icon {
    width: 18px; flex-shrink: 0;
    display: inline-grid; place-items: center;
    color: var(--navy-soft);
  }
  .rail-item .icon svg { width: 16px; height: 16px; fill: currentColor; display: block; }
  .rail-item.smart .icon { color: var(--gold-dark); }
  .rail-item.active .icon { color: var(--gold-dark); }
  .rail-item .count {
    margin-left: auto;
    font-size: 11px; font-weight: 700;
    color: var(--muted);
  }
  .rail-item.active .count { color: var(--gold-dark); }
  .rail-item .count:empty { display: none; }

  /* Middle list */
  .tasks-main {
    display: flex; flex-direction: column;
    min-height: 0; background: var(--paper);
    border-right: 1px solid var(--line);
  }
  .tasks-main-head {
    padding: 22px 28px 14px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 14px;
  }
  .tasks-title {
    font-size: 24px; font-weight: 700; color: var(--navy);
    flex: 1;
  }
  .tasks-title .sub {
    display: block; font-size: 12px; color: var(--muted); font-weight: 500; margin-top: 2px;
  }

  .add-task-row {
    padding: 14px 28px;
    border-bottom: 1px solid var(--line);
    background: var(--cream);
  }
  .add-task-wrap {
    display: flex; align-items: center; gap: 10px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 8px 14px;
    transition: border-color .12s;
  }
  .add-task-wrap:focus-within { border-color: var(--gold); }
  .add-task-input {
    flex: 1; border: none; outline: none; background: transparent;
    font-family: inherit; font-size: 14px; color: var(--navy);
  }
  .add-task-btn {
    background: var(--red); color: white;
    border: none; padding: 6px 14px; border-radius: 999px;
    font-family: inherit; font-size: 12.5px; font-weight: 600;
    cursor: pointer;
  }
  .add-task-btn:disabled { opacity: .4; cursor: not-allowed; }

  .task-list {
    flex: 1; overflow-y: auto; padding: 6px 18px 80px;
  }
  .task-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 14px; border-radius: 10px;
    cursor: pointer; transition: background .12s;
  }
  .task-row:hover { background: var(--cream); }
  .task-row.selected { background: var(--cream-dark); }
  .task-checkbox {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid var(--muted);
    flex-shrink: 0; margin-top: 1px;
    cursor: pointer;
    display: grid; place-items: center;
    transition: border-color .12s, background .12s;
  }
  .task-checkbox:hover { border-color: var(--gold); }
  .task-row.completed .task-checkbox {
    background: var(--good); border-color: var(--good);
  }
  .task-row.completed .task-checkbox::after {
    content: "✓"; color: white; font-size: 12px; font-weight: 700;
  }
  .task-row.completed .task-title {
    color: var(--muted); text-decoration: line-through;
  }
  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 14px; color: var(--navy); font-weight: 500; line-height: 1.4; }
  .task-meta {
    display: flex; gap: 12px;
    margin-top: 4px;
    font-size: 11.5px; color: var(--muted);
    flex-wrap: wrap;
    align-items: center;
  }
  .task-meta > * { display: inline-flex; align-items: center; gap: 4px; }
  .task-meta .due { color: var(--gold-dark); font-weight: 600; }
  .task-meta .due.overdue { color: var(--red); }
  .task-meta .my-day-tag { color: var(--good); font-weight: 600; }
  .task-meta .src-link { color: var(--gold-dark); text-decoration: none; }
  .task-meta .src-link:hover { text-decoration: underline; }
  .task-meta .meta-i {
    display: inline-grid; place-items: center;
    color: currentColor; opacity: .85;
  }
  .task-meta .meta-i svg { width: 12px; height: 12px; fill: currentColor; display: block; }

  .task-star {
    background: transparent; border: none;
    color: var(--muted); cursor: pointer;
    width: 28px; height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: grid; place-items: center;
  }
  .task-star:hover { background: var(--cream-dark); }
  .task-star.starred { color: var(--gold); }
  .task-star svg { width: 16px; height: 16px; fill: currentColor; }

  .list-empty-state {
    text-align: center; padding: 60px 30px;
    color: var(--muted);
  }
  .list-empty-state .icon { font-size: 36px; color: var(--gold); margin-bottom: 10px; }
  .list-empty-state .empty-svg { display: inline-grid; place-items: center; margin-bottom: 12px; color: var(--gold); }
  .list-empty-state .empty-svg svg { width: 40px; height: 40px; fill: currentColor; }
  .list-empty-state .title { font-size: 15px; font-weight: 600; color: var(--navy); margin-bottom: 6px; }
  .list-empty-state .sub { font-size: 13px; line-height: 1.5; max-width: 320px; margin: 0 auto; }

  /* Right detail pane */
  .task-detail {
    background: var(--cream);
    border-left: 1px solid var(--line);
    overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .detail-head {
    padding: 18px 22px 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .detail-checkbox {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--muted);
    cursor: pointer;
    display: grid; place-items: center;
  }
  .detail-checkbox:hover { border-color: var(--gold); }
  .detail-checkbox.checked { background: var(--good); border-color: var(--good); }
  .detail-checkbox.checked::after { content: "✓"; color: white; font-size: 14px; font-weight: 700; }
  .detail-title-input {
    flex: 1; border: none; outline: none; background: transparent;
    font-family: inherit; font-size: 15px; font-weight: 600;
    color: var(--navy);
  }
  .detail-title-input.completed { color: var(--muted); text-decoration: line-through; }
  .detail-star {
    background: transparent; border: none;
    color: var(--muted); cursor: pointer;
    width: 28px; height: 28px; border-radius: 50%;
  }
  .detail-star.starred { color: var(--gold); }
  .detail-star svg { width: 18px; height: 18px; fill: currentColor; }

  .detail-section {
    padding: 4px 18px;
  }
  .detail-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px;
    cursor: pointer; transition: background .12s;
    font-size: 13.5px; color: var(--navy-soft);
  }
  .detail-row:hover { background: var(--paper); }
  .detail-row .icon {
    width: 16px; height: 16px;
    color: var(--gold-dark);
    display: inline-grid; place-items: center;
    flex-shrink: 0;
  }
  .detail-row .icon svg { width: 16px; height: 16px; fill: currentColor; display: block; }
  .detail-row .value {
    flex: 1; color: var(--navy);
  }
  .detail-row.empty .value { color: var(--muted); }
  .detail-row input[type="datetime-local"], .detail-row input[type="date"] {
    flex: 1; border: none; outline: none; background: transparent;
    font-family: inherit; font-size: 13.5px; color: var(--navy);
  }

  .detail-steps {
    padding: 10px 18px;
    border-bottom: 1px solid var(--line);
  }
  .step-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 4px;
  }
  .step-check {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid var(--muted); cursor: pointer; flex-shrink: 0;
    display: grid; place-items: center;
  }
  .step-check.checked { background: var(--good); border-color: var(--good); }
  .step-check.checked::after { content: "✓"; color: white; font-size: 10px; font-weight: 700; }
  .step-title {
    flex: 1; border: none; outline: none; background: transparent;
    font-family: inherit; font-size: 13px; color: var(--navy);
  }
  .step-title.completed { text-decoration: line-through; color: var(--muted); }
  .step-delete {
    opacity: 0; background: transparent; border: none;
    color: var(--muted); cursor: pointer; font-size: 14px;
    width: 22px; height: 22px;
  }
  .step-row:hover .step-delete { opacity: 1; }
  .step-add {
    display: flex; gap: 6px;
    padding: 6px 4px;
  }
  .step-add input {
    flex: 1; border: 1px dashed var(--line);
    background: transparent; padding: 6px 10px;
    border-radius: 6px; outline: none; font-family: inherit; font-size: 12.5px;
  }
  .step-add input:focus { border-color: var(--gold); }

  .detail-notes {
    padding: 10px 18px;
    border-bottom: 1px solid var(--line);
  }
  .detail-notes textarea {
    width: 100%; min-height: 80px;
    border: none; outline: none; background: transparent;
    font-family: inherit; font-size: 13px; color: var(--navy);
    resize: vertical;
  }

  .detail-foot {
    margin-top: auto;
    padding: 12px 18px;
    border-top: 1px solid var(--line);
    background: var(--paper);
    display: flex; align-items: center; gap: 10px;
    font-size: 11.5px; color: var(--muted);
  }
  .detail-foot-spacer { flex: 1; }
  .detail-delete {
    background: transparent; border: none;
    color: var(--muted); cursor: pointer;
    padding: 6px;
    border-radius: 6px;
  }
  .detail-delete:hover { color: var(--bad); background: rgba(196,69,69,.08); }
  .detail-delete svg { width: 16px; height: 16px; fill: currentColor; }

  .section-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: .5px;
    color: var(--muted); font-weight: 700;
    padding: 8px 18px 4px;
  }
</style>
</head>
<body>

<div class="tasks-app no-selection" id="app">

  <!-- LEFT RAIL: smart lists + custom lists + groups -->
  <aside class="tasks-rail">
    <div class="tasks-rail-head">
      <a href="/" class="back">← Inbox</a>
      <div style="flex:1"></div>
      <span style="font-size:13px;font-weight:700;color:var(--navy)">Tasks</span>
    </div>
    <div class="tasks-rail-body">
      <div class="rail-section">
        <div class="rail-section-label">Smart lists</div>
        <div class="rail-item smart active" data-view="my-day">
          <span class="icon"><svg viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13l2 .14V11l-2 .14V13zm18 0l2-.14V11l-2 .14V13zM11 2v2.14h2V2h-2zm0 18v2h2v-2h-2zM5.99 4.58l-1.41 1.41 1.42 1.42 1.41-1.41-1.42-1.42zm12.02 12.02l-1.41 1.41 1.42 1.42 1.41-1.41-1.42-1.42zm1.42-13.43l-1.41-1.42-1.42 1.42 1.41 1.42 1.42-1.42zM4.57 18l-1.41-1.42-1.42 1.42 1.42 1.41 1.41-1.41z"/></svg></span>
          <span>My Day</span>
          <span class="count" id="count-my-day"></span>
        </div>
        <div class="rail-item smart" data-view="important">
          <span class="icon"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
          <span>Important</span>
          <span class="count" id="count-important"></span>
        </div>
        <div class="rail-item smart" data-view="planned">
          <span class="icon"><svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zM5 8V6h14v2H5z"/></svg></span>
          <span>Planned</span>
          <span class="count" id="count-planned"></span>
        </div>
        <div class="rail-item smart" data-view="all">
          <span class="icon"><svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zm0-10v2h14V7H7z"/></svg></span>
          <span>All</span>
          <span class="count" id="count-all"></span>
        </div>
        <div class="rail-item smart" data-view="completed">
          <span class="icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></span>
          <span>Completed</span>
        </div>
        <div class="rail-item smart" data-view="tasks">
          <span class="icon"><svg viewBox="0 0 24 24"><path d="M19 5v14H5V5h14m0-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-4 12.5l-1.41-1.41-2.59 2.58-2.58-2.58L7 16.5l4 4 4-4z"/></svg></span>
          <span>Tasks</span>
          <span class="count" id="count-tasks"></span>
        </div>
      </div>
      <div class="rail-section" id="customLists"></div>
    </div>
    <div class="tasks-rail-foot">
      <button class="new-list-btn" id="newListBtn">+ New list</button>
    </div>
  </aside>

  <!-- MIDDLE: task list -->
  <section class="tasks-main">
    <header class="tasks-main-head">
      <div class="tasks-title" id="viewTitle">My Day<span class="sub" id="viewSub"></span></div>
    </header>
    <div class="add-task-row">
      <div class="add-task-wrap">
        <input class="add-task-input" id="addTaskInput" placeholder="+ Add a task">
        <button class="add-task-btn" id="addTaskBtn" disabled>Add</button>
      </div>
    </div>
    <div class="task-list" id="taskList"></div>
  </section>

  <!-- RIGHT: detail pane -->
  <section class="task-detail" id="taskDetail"></section>

</div>

<script src="/tasks.js"></script>
</body>
</html>
