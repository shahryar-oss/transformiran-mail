<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Delta Mail — Transform Iran</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/styles.css">
<style>
  body { display: grid; place-items: center; min-height: 100vh; background: var(--cream); }
  .landing {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 56px 48px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 20px 60px rgba(40,47,57,.10);
    text-align: center;
  }
  .landing .delta-mark {
    width: 64px; height: 64px;
    background: var(--navy);
    border-radius: 16px;
    display: grid; place-items: center;
    margin: 0 auto 20px;
    box-shadow: 0 8px 24px rgba(40,47,57,.18);
  }
  .landing h1 { margin: 0 0 6px; font-size: 26px; font-weight: 700; color: var(--navy); }
  .landing .sub { color: var(--navy-soft); font-size: 14px; margin-bottom: 32px; }
  .landing .sub strong { color: var(--gold-dark); }
  .google-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 12px 22px;
    background: white;
    color: #1f1f1f;
    border: 1px solid #dadce0;
    border-radius: 999px;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
    transition: box-shadow .15s, transform .15s;
  }
  .google-btn:hover { box-shadow: 0 4px 12px rgba(0,0,0,.10); transform: translateY(-1px); }
  .google-btn svg { width: 20px; height: 20px; }
  .footer-note { margin-top: 32px; color: var(--muted); font-size: 12px; line-height: 1.6; }
  .err {
    margin: 0 0 24px;
    padding: 10px 14px;
    border-radius: 8px;
    background: #FCEDED;
    color: #8B1F1F;
    font-size: 13px;
    text-align: left;
  }
</style>
</head>
<body>

<main class="landing">
  <div class="delta-mark" aria-hidden="true">
    <svg viewBox="0 0 32 32" width="36" height="36">
      <defs>
        <linearGradient id="dg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#3FB6FF"/>
          <stop offset="100%" stop-color="#A8E063"/>
        </linearGradient>
      </defs>
      <polygon points="16,4 28,26 4,26" fill="url(#dg)"/>
    </svg>
  </div>

  <h1>Delta Mail</h1>
  <p class="sub">Executive-assistant email for <strong>Transform Iran</strong>.</p>

  <div id="errBox" class="err" hidden></div>

  <a href="/auth/google" class="google-btn">
    <svg viewBox="0 0 18 18" aria-hidden="true">
      <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.17-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.71-1.57 2.68-3.89 2.68-6.62z"/>
      <path fill="#34A853" d="M9 18c2.43 0 4.47-.81 5.96-2.18l-2.92-2.26c-.81.54-1.85.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.32A9 9 0 0 0 9 18z"/>
      <path fill="#FBBC05" d="M3.97 10.72A5.41 5.41 0 0 1 3.68 9c0-.6.1-1.18.29-1.72V4.96H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.04l3.01-2.32z"/>
      <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.42 0 9 0A9 9 0 0 0 .96 4.96l3.01 2.32C4.68 5.16 6.66 3.58 9 3.58z"/>
    </svg>
    <span>Sign in with Google</span>
  </a>

  <p class="footer-note">
    Sign in with your <code>@transformiran.com</code> Google account.<br>
    Delta Mail uses Google's Internal audience — only Workspace members can enter.
  </p>
</main>

<script>
  (function(){
    const errs = {
      bad_state: "Login attempt expired. Please try again.",
      no_code:   "Google didn't return an authorization code. Try again.",
      wrong_workspace: "Only @transformiran.com Workspace accounts can sign in.",
      auth_failed: "Something went wrong signing in. Please try again.",
      oauth_no_email: "Google didn't return your email. Try again.",
    };
    const params = new URLSearchParams(location.search);
    const err = params.get("err");
    if (err) {
      const box = document.getElementById("errBox");
      box.textContent = errs[err] || ("Sign-in error: " + err);
      box.hidden = false;
    }
  })();
</script>

</body>
</html>
