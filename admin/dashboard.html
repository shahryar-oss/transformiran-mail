<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Delta Mail — Admin Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { --gold:#B28E44; --gold-dark:#8E6F35; --navy:#282F39; --navy-soft:#4a5360;
    --cream:#F7F3E9; --cream-dark:#efe8d6; --paper:#fff; --line:#e6e0d2; --red:#E92A2E;
    --good:#3a9d5a; --muted:#8a8270; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--cream); color:var(--navy); font-size:14px; }
  header { display:flex; align-items:center; gap:12px; padding:16px 28px; background:var(--navy);
    color:#fff; position:sticky; top:0; z-index:5; }
  header img { width:26px; height:26px; }
  header b { font-size:15px; }
  header .sub { color:#c8cdd4; font-size:12.5px; }
  header .spacer { flex:1; }
  header button { background:rgba(255,255,255,.12); color:#fff; border:none; border-radius:8px;
    padding:7px 14px; font-size:12.5px; font-weight:600; cursor:pointer; font-family:inherit; }
  header button:hover { background:rgba(255,255,255,.22); }
  .wrap { max-width:1180px; margin:0 auto; padding:24px 28px 60px; }
  .tabs { display:flex; gap:8px; margin-bottom:20px; }
  .tab { border:1px solid var(--line); background:var(--paper); color:var(--navy-soft);
    padding:8px 16px; border-radius:999px; cursor:pointer; font-weight:600; font-size:13px; }
  .tab.active { background:var(--gold); border-color:var(--gold); color:#fff; }
  .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:14px; margin-bottom:26px; }
  .kpi { background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:16px 18px; }
  .kpi .v { font-size:26px; font-weight:800; color:var(--navy); }
  .kpi .l { font-size:12px; color:var(--muted); margin-top:4px; }
  .kpi .sub2 { font-size:11px; color:var(--gold-dark); margin-top:2px; }
  table { width:100%; border-collapse:collapse; background:var(--paper); border:1px solid var(--line); border-radius:14px; overflow:hidden; }
  th,td { text-align:left; padding:11px 14px; font-size:13px; border-bottom:1px solid var(--line); }
  th { background:var(--cream-dark); color:var(--navy-soft); font-size:11px; text-transform:uppercase; letter-spacing:.5px; }
  tr:last-child td { border-bottom:none; }
  td.num, th.num { text-align:right; font-variant-numeric:tabular-nums; }
  .row-name { font-weight:700; }
  .row-email { color:var(--muted); font-size:12px; }
  .badge { font-size:11px; font-weight:700; padding:2px 9px; border-radius:999px; }
  .badge.active { background:rgba(58,157,90,.14); color:var(--good); }
  .badge.blocked { background:rgba(233,42,46,.12); color:var(--red); }
  .act-btn { border:1px solid var(--line); background:var(--paper); border-radius:8px; padding:5px 11px;
    cursor:pointer; font-size:12px; font-weight:600; font-family:inherit; }
  .act-btn.block { color:var(--red); border-color:rgba(233,42,46,.4); }
  .act-btn.unblock { color:var(--good); border-color:rgba(58,157,90,.4); }
  .act-btn:hover { background:var(--cream); }
  .clickable { cursor:pointer; }
  .clickable:hover { background:var(--cream); }
  .muted { color:var(--muted); }
  .loading { padding:40px; text-align:center; color:var(--muted); }
  /* drawer */
  .drawer-back { position:fixed; inset:0; background:rgba(40,47,57,.35); display:none; z-index:20; }
  .drawer-back.open { display:block; }
  .drawer { position:fixed; top:0; right:0; height:100vh; width:560px; max-width:92vw; background:var(--cream);
    box-shadow:-12px 0 40px rgba(40,47,57,.2); transform:translateX(100%); transition:transform .2s; z-index:21;
    overflow-y:auto; }
  .drawer.open { transform:translateX(0); }
  .drawer-head { padding:18px 22px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px; position:sticky; top:0; background:var(--cream); }
  .drawer-head .x { margin-left:auto; cursor:pointer; font-size:22px; color:var(--muted); border:none; background:none; }
  .drawer-body { padding:18px 22px; }
  .chat-turn { margin-bottom:12px; padding:10px 12px; border-radius:10px; border:1px solid var(--line); background:var(--paper); }
  .chat-turn.user { background:var(--cream-dark); }
  .chat-turn .who { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; color:var(--gold-dark); margin-bottom:4px; }
  .chat-turn.user .who { color:var(--navy-soft); }
  .chat-turn .when { float:right; font-weight:400; text-transform:none; color:var(--muted); letter-spacing:0; }
  .chat-turn .txt { white-space:pre-wrap; font-size:13px; line-height:1.5; }
  .sec-label { font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:var(--gold-dark); font-weight:700; margin:18px 0 10px; }
  [hidden] { display:none !important; }
</style>
</head>
<body>
<header>
  <img src="/delta-logo.png" alt=""><b>Delta Mail</b><span class="sub">Admin console</span>
  <span class="spacer"></span>
  <button id="logoutBtn">Sign out</button>
</header>
<div class="wrap">
  <div class="tabs">
    <button class="tab active" data-tab="users">Users &amp; analytics</button>
    <button class="tab" data-tab="chats">Delta chat monitoring</button>
  </div>

  <section id="tab-users">
    <div class="kpis" id="kpis"><div class="loading">Loading…</div></div>
    <table id="usersTable">
      <thead><tr>
        <th>User</th><th>Last active</th><th class="num">Time (30d)</th>
        <th class="num">Emails (30d)</th><th class="num">Delta calls</th>
        <th class="num">Delta cost (30d)</th><th>Status</th><th></th>
      </tr></thead>
      <tbody id="usersBody"><tr><td colspan="8" class="loading">Loading users…</td></tr></tbody>
    </table>
  </section>

  <section id="tab-chats" hidden>
    <div class="muted" style="margin-bottom:12px">Most recent Delta conversation turns across all users — for quality review.</div>
    <div id="chatsList" class="loading">Loading…</div>
  </section>
</div>

<!-- per-user drawer -->
<div class="drawer-back" id="drawerBack"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-head">
    <div><div class="row-name" id="dUserName">—</div><div class="row-email" id="dUserEmail"></div></div>
    <button class="x" id="drawerClose">×</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</aside>

<script src="/admin/app.js"></script>
</body>
</html>
