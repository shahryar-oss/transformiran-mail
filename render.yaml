# Render Blueprint for transformiran-mail.
# Web service + Postgres, all in the same workspace as the dashboard.

services:
  - type: web
    name: transformiran-mail
    runtime: node
    region: oregon
    plan: starter
    branch: main
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_URL
        value: https://mail.transformiran.info
      - key: DATABASE_URL
        fromDatabase:
          name: transformiran-mail-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: SYNC_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://mail.transformiran.info/auth/google/callback

databases:
  - name: transformiran-mail-db
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: 16
